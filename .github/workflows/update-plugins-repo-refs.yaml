name: Update plugins repository references
on:
  workflow_call:
    inputs:
      regexps:
        type: string
        required: true
      
      overlay-repo:
        type: string
        required: true
      
      release-branch-prefix:
        type: string
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest

    name: Prepare 
    outputs:
      workspace-keys: ${{ steps.gather-workspaces.outputs.workspace-keys }}

    steps:
      - name: Use node.js 20.x
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org/ # Needed for auth

      - uses: actions/checkout@v4.2.2

      - name: Get published community plugins
        id: get-published-community-plugins
        shell: bash
        run: |
          function debug() {
            if [[ "$ACTIONS_STEP_DEBUG" == "true" ]]
            then
              echo "$1"
            fi
          }
          npm install semver -g
          regexps='${{ inputs.regexps }}'
          overlayRepoBranches=$(curl -s https://api.github.com/repos/${{ inputs.overlay-repo }}/branches  | jq -r '.[].name | select(startswith("${{ inputs.release-branch-prefix }}"))')
          supportedBackstageVersions={}
          for overlayRepoBranch in ${overlayRepoBranches}
          do
            supportedBackstageVersion=$(curl -s https://raw.githubusercontent.com/${{ inputs.overlay-repo }}/${overlayRepoBranch}/versions.json | jq -r '.backstage')
            $supportedBackstageVersions=$(echo "$supportedBackstageVersions" | jq --arg branch "$overlayRepoBranch" --arg version "$supportedBackstageVersion" '. + {($branch): $version}')
          done

          plugins=$(          
            comma=""
            echo '['
            for regexp in ${regexps}
            do
              echo "Searching plugins for regexp: ${regexp}" >&2
              npmPackages=`npm search "/^(${regexp})/" --searchlimit=1000 --json --no-description --searchexclude "/^(?!(${regexp}))/" | jq -r '.[].name' | sort`
              for packageName in ${npmPackages}
              do
                if [[ "${packageName}" == *"-node" ]] || [[ "${packageName}" == *"-common" ]] || [[ "${packageName}" == *"-react" ]] 
                then
                  debug "Skipping published package ${packageName}: not a plugin" >&2
                  continueman npm ;
                fi
                npmPackage=$(npm view --json ${package} backstage versions)
                if [[ "$(echo ${nmpPackage} | jq -r '.backstage.role')" != *"-plugin"* ]]
                then
                  debug "Skipping published package ${packageName}: not a plugin" >&2
                  continue
                fi
                oneVersionFound=false
                echo "Fetching published versions of plugin ${packageName}" >&2
                for version in $(echo ${npmPackage} | jq -r '.versions | if type == "string" then . else .[] end | select(test("[^-]+-.+")|not)' | sort -Vr)
                do
                  pluginInfo=$(npm view --json ${packageName}@${version} name version gitHead repository  | jq '. | {name, version, directory: .repository.directory, url: .repository.url, gitHead }')
                  gitRepo=$(echo ${pluginInfo} | jq -r '.url | if (. | startswith("https://github.com/")) then (. | sub("https://github.com/(?<name>.*)"; "\(.name)")) else "" end')
                  if [[ "${gitRepo}" == "" ]]
                  then
                    echo "Skipping published plugin ${packageName}@${version}, since source are not on GitHub." >&2
                    continue
                  fi
                  flat="false"
                  workspace=$(echo ${pluginInfo} | jq -r '.directory | if (. | startswith("workspaces/")) then (. | sub("workspaces/(?<name>[^/]*)/plugins/.*"; "\(.name)")) else "" end')
                  if [[ "${workspace}" == "" ]]
                  then
                    workspace=$(echo ${gitRepo} | sed 's:.*/\([^/]*\)$:\1:')
                    flat="true"
                  fi
                  gitHead=$(echo ${pluginInfo} | jq -r '.gitHead')
                  backstageVersion=$(curl -s https://raw.githubusercontent.com/${gitRepo}/${gitHead}/workspaces/${workspace}/backstage.json | jq -r '.version')

                  pluginBranch=""
                  echo "${supportedBackstageVersions} | js -r 'to_entries[] | "\(.key) \(.value)"' | while read -r overlayRepoBranch supportedBackstageVersion
                  do
                    if [[ "${supportedBackstageVersion}" == "$(semver -r ~${backstageVersion} ${supportedBackstageVersion})" ]]
                    then
                      pluginBranch=${overlayRepoBranch}
                      break
                    fi
                  done

                  if [[ "${pluginBranch}" == "" ]]
                  then
                    if [[ $oneVersionFound ]]
                    then
                      debug "Skipping published plugin ${packageName}@${version}, since the underlying Backstage version ${backstageVersion} is not used by RHDH" >&2
                      continue
                    else
                      echo "Skipping version ${version} and earlier of published plugin ${packageName}, since the underlying Backstage version ${backstageVersion} is too old for RHDH" >&2
                      break
                  fi

                  oneVersionFound=true
                  addedFields="{\"workspace\":\"$workspace\", \"backstageVersion\": \"$backstageVersion\", \"branch\": \"$pluginBranch\", \"repo\": \"$gitRepo\", \"flat\": $flat}"
                  pluginInfo=$(echo "${pluginInfo}" | jq ".+= $addedFields")
                  echo -n "${comma} ${pluginInfo}"
                  comma=','
                done
              done
              echo ']'
            done
          )

          echo "Plugins to analyze:"
          echo "$plugins"
          echo "$plugins" | jq -c > published-plugins.json

      - name: Gather Workspaces
        id: gather-workspaces
        shell: bash
        run: |
            plugins=$(cat published-plugins.json)
            workspaces=$(echo ${plugins} | jq 'group_by(.branch + "__" + .workspace) | map({ (.[0].branch + "__" + .[0].workspace): {"workspace": .[0].workspace, "branch": .[0].branch, "backstageVersion": .[0].backstageVersion, "plugins": (. | group_by(.name) | map(. | sort_by(.version) | last ) )} }) | add')
  
            echo "Workspaces:"
            echo "$workspaces"
  
            echo "$workspaces" | jq -c > workspaces.json
            echo "workspace-keys=$(echo $workspaces | jq -c keys)" >> $GITHUB_OUTPUT

      - name: Upload workspaces json file
        uses: actions/upload-artifact@v4
        with:
          name: workspaces
          path: workspaces.json
              
  export:
    name: Export

    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJSON(needs.prepare.outputs.workspace-keys) }}

    steps:

      - uses: actions/checkout@v4.2.2

      - name: Download workspaces json file
        uses: actions/download-artifact@v4
        with:
          name: workspaces

      - name: Get workspace JSON
        id: get-workspace-json
        shell: bash
        run: |
          workspace="$(cat workspaces.json | jq '.["${{ matrix.workspace }}"]')"
          echo "Workspace:"
          echo "${workspace}"

          echo workspace=$(echo "${workspace}" | jq -c) >> $GITHUB_OUTPUT

      - name: Get workspace Commit ID
        id: get-workspace-commit-id
        shell: bash
        run: |
          workspace='${{ steps.get-workspace-json.outputs.workspace }}'          
          repository=$(echo "$workspace" | jq -r 'repo')
          commits=$(echo "$workspace" | jq -r '[ .plugins[] | .gitHead ] | unique | .[]')
          pluginDirectories=$(echo '${{ steps.get-workspace-json.outputs.workspace }}' | jq -r '.plugins[] | .directory')
          if [[ $(echo ${commits} | wc -w) == 1 ]]
          then
            workspaceCommit="${commits}"
          else
            workspaceCommit=""
            for commit in ${commits}
            do
              for pluginDirectory in ${pluginDirectories}
              do
                packageJson=$(curl -s https://raw.githubusercontent.com/${repository}/${commit}/${pluginDirectory}/package.json)
                version=$(echo "${packageJson}" | jq -r '.version')
                workspaceVersion=$(echo "${workspace}" | jq -r ".plugins[] | select(.directory == \"${pluginDirectory}\") | .version")
                pluginName=$(echo "${workspace}" | jq -r ".plugins[] | select(.directory == \"${pluginDirectory}\") | .name")
                if [[ "${version}" != "${workspaceVersion}" ]]
                then
                  echo "Skipping commit ${commit}: plugin ${pluginName} version not the latest version: ${version} != ${workspaceVersion}"
                  continue 2
                fi
              done
              if [[ "${workspaceCommit}" != "" ]]
              then
                echo "Cannot decide between workspace commits: ${commit} and ${workspaceCommit}"
                break 2
              fi
              workspaceCommit="${commit}"
            done
          fi
          echo "Workspace commit: ${workspaceCommit}"
          echo "workspace-commit=${workspaceCommit}" >> $GITHUB_OUTPUT
          
      - name: Create PR if necessary
        id: create-pr-if-necessary
        uses: actions/github-script@v7
        with:
          script: |
            const [owner, repo] = '${{ inputs.overlay-repo }}'.split('/');
            const prBranchName = 'workspaces/${{ matrix.workspace }}';
            const workspaceCommit = '${{ steps.get-workspace-commit-id.outputs.workspace-commit }}';
            const workspaceJson ='${{ steps.get-workspace-json.outputs.workspace }}';

            const script = require('.github/workflows/create-pr-if-necessary.js');
            await script({
              github,
              core,
              owner,
              repo,
              prBranchName,
              workspaceCommit,
              workspaceJson,
            });
